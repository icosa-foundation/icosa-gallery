{% load util_tags %}
<h3>Changed/new field values:</h3>
{% for field in obj.moderation_changed_fields %}
    <div class="well">
        <h4>{{ field }}:</h4>
        {% if field == "description" %}
            {% if obj.description %}
                <p>{{ obj.description|linebreaksbr }}</p>
            {% endif %}
        {% else %}
            <p>{{ obj|get_attr:field }}</p>
        {% endif %}
    </div>
{% endfor %}
